{% extends "base.html" %}
{% block title %}회원가입 · 미나리마켓{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:0 auto;">
  <h1>회원가입</h1>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="username">아이디</label>
    <input type="text" id="username" name="username" value="{{ username or '' }}"
           maxlength="20" autocomplete="username" required>
    <p class="hint">영문/숫자/밑줄(_) 4~20자</p>

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password"
           maxlength="64" autocomplete="new-password" required>
    <p class="hint">영문과 숫자를 포함해 8자 이상</p>

    <label for="password2">비밀번호 확인</label>
    <input type="password" id="password2" name="password2"
           maxlength="64" autocomplete="new-password" required>

    <div style="margin-top:18px;">
      <button class="btn" type="submit">가입하기</button>
      <a class="muted" href="{{ url_for('auth.login') }}" style="margin-left:10px;">이미 계정이 있어요</a>
    </div>
  </form>
</div>
{% endblock %}
