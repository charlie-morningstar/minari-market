{% extends "base.html" %}
{% block title %}신고 · 미나리마켓{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
  <h1>{{ '사용자' if type == 'user' else '상품' }} 신고</h1>
  <p class="muted">허위 신고는 제재 대상이 될 수 있습니다. 신고 사유를 구체적으로 작성해 주세요.</p>

  <form method="post" action="{{ url_for('community.report') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="type" value="{{ type }}">
    <input type="hidden" name="target_id" value="{{ target_id }}">

    <label for="reason">신고 사유</label>
    <textarea id="reason" name="reason" maxlength="500" required
              placeholder="예: 허위 매물, 욕설, 사기 의심 등"></textarea>

    <div style="margin-top:16px;">
      <button class="btn btn-danger" type="submit">신고 접수</button>
      <a class="btn btn-sub" href="{{ url_for('products.index') }}">취소</a>
    </div>
  </form>
</div>
{% endblock %}
