{% extends "base.html" %}
{% block title %}로그인 · 미나리마켓{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:0 auto;">
  <h1>로그인</h1>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="username">아이디</label>
    <input type="text" id="username" name="username" value="{{ username or '' }}"
           maxlength="20" autocomplete="username" required>

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password"
           maxlength="64" autocomplete="current-password" required>

    <div style="margin-top:18px;">
      <button class="btn" type="submit">로그인</button>
      <a class="muted" href="{{ url_for('auth.register') }}" style="margin-left:10px;">회원가입</a>
    </div>
  </form>
</div>
{% endblock %}
